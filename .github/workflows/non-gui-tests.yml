name: Non-GUI tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  non-gui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make

      - name: Run non-GUI test suite
        run: |
          make -C test all
